services:
  db:
    image: mariadb:11.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${WORDPRESS_DB_NAME:-gdd_wordpress}
      MYSQL_USER: ${WORDPRESS_DB_USER:-gdd_wp}
      MYSQL_PASSWORD: ${WORDPRESS_DB_PASSWORD:-gdd_wp_password}
      MYSQL_ROOT_PASSWORD: ${WORDPRESS_DB_ROOT_PASSWORD:-gdd_root_password}
    volumes:
      - wordpress_db:/var/lib/mysql

  wordpress:
    image: wordpress:6.6-php8.2-apache
    restart: unless-stopped
    depends_on:
      - db
    ports:
      - "${WORDPRESS_PORT:-8080}:80"
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_NAME: ${WORDPRESS_DB_NAME:-gdd_wordpress}
      WORDPRESS_DB_USER: ${WORDPRESS_DB_USER:-gdd_wp}
      WORDPRESS_DB_PASSWORD: ${WORDPRESS_DB_PASSWORD:-gdd_wp_password}
      WORDPRESS_CONFIG_EXTRA: |
        define('WP_DEBUG', true);
        define('WP_DEBUG_DISPLAY', false);
    volumes:
      - wordpress_html:/var/www/html
      - ./wordpress/mu-plugins:/var/www/html/wp-content/mu-plugins

volumes:
  wordpress_db:
  wordpress_html:
